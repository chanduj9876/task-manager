spring:
  application:
    name: task-manager

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: task-manager-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.taskmanager.*"
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
        request.timeout.ms: 11000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: 10000
        request.timeout.ms: 10000
        delivery.timeout.ms: 30000   # must be > request.timeout.ms
        retries: 3

server:
  port: 8080
  servlet:
    context-path: /
  # Uncomment the line below when deploying behind a trusted reverse proxy (nginx/ALB).
  # This lets Spring resolve the real client IP securely from X-Forwarded-For.
  # forward-headers-strategy: native

app:
  jwt:
    secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

logging:
  level:
    com.taskmanager: DEBUG
    org.springframework.security: INFO
